repos:
  - repo: local
    hooks:
      
      - id: ruff-check
        name: ruff check
        description: "Ruff: linting"
        entry: poetry run ruff check
        language: system
        minimum_pre_commit_version: 2.9.2
        require_serial: true
        types_or: [ python, pyi ]
      
      
      - id: ruff-lint
        name: ruff lint
        description: "Run 'ruff' for extremely fast Python formatting"
        entry: poetry run ruff format
        language: system
        types: [ python ]
        args: [ --fix ]
        require_serial: false
        additional_dependencies: [ ]
        minimum_pre_commit_version: '0'
        files: '^(src|tests)/'
      
      
      - id: mypy
        name: mypy
        description: '`mypy` will check Python types for correctness'
        entry: poetry run mypy
        language: system
        types_or: [ python, pyi ]
        require_serial: true
        additional_dependencies: [ ]
        minimum_pre_commit_version: '2.9.2'
        files: '^(src|tests)/'
      
